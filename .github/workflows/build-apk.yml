name: Build PidLane APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android || echo "Already added"

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Add Bluetooth permissions to AndroidManifest
        run: |
          python3 - <<'PY'
          import re, sys, pathlib

          path = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          xml = path.read_text()

          print("── Manifest VOOR injectie ──")
          print(xml)

          # 1. Verwijder bestaande (mogelijk verkeerde) BT/locatie-permissies,
          #    zodat we altijd de juiste set neerzetten (zelf-corrigerend).
          xml = re.sub(
              r'\s*<uses-permission[^>]*android\.permission\.'
              r'(BLUETOOTH[A-Z_]*|ACCESS_FINE_LOCATION|ACCESS_COARSE_LOCATION)[^>]*/>',
              '', xml)
          # Bestaande bluetooth uses-feature regels ook strippen (anders dupliceren ze).
          xml = re.sub(
              r'\s*<uses-feature[^>]*android\.hardware\.bluetooth[a-z_]*[^>]*/>',
              '', xml)
          # Eerdere injectie-comment ook opruimen.
          xml = re.sub(r'\s*<!-- PidLane BT permissies.*?-->', '', xml)

          # 2. De correcte permissie-set.
          #    Android 12+ (31+): SCAN met neverForLocation + CONNECT (geen locatie nodig).
          #    Android <= 11 (<=30): klassieke BT + FINE_LOCATION, beperkt tot maxSdkVersion 30.
          perms = (
              '\n    <!-- PidLane BT permissies (geinjecteerd door CI) -->'
              '\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />'
              '\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />'
              '\n    <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />'
              '\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />'
              '\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" android:maxSdkVersion="30" />'
              '\n    <uses-feature android:name="android.hardware.bluetooth" android:required="false" />'
              '\n    <uses-feature android:name="android.hardware.bluetooth_le" android:required="false" />'
          )

          # 3. Injecteer direct na de <manifest ...> open-tag (anker-onafhankelijk).
          m = re.search(r'<manifest\b[^>]*>', xml)
          if not m:
              print("FOUT: <manifest> tag niet gevonden")
              sys.exit(1)
          xml = xml[:m.end()] + perms + xml[m.end():]

          path.write_text(xml)

          print("── Manifest NA injectie ──")
          print(xml)

          # 4. Hard falen als de cruciale permissie er niet in staat.
          if 'BLUETOOTH_SCAN' not in xml or 'neverForLocation' not in xml:
              print("FOUT: BT-permissie-injectie mislukt")
              sys.exit(1)
          print("OK: Bluetooth-permissies correct geinjecteerd")
          PY

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PidLane-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          
      - name: Add Bluetooth permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "BLUETOOTH_ADMIN" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.BLUETOOTH" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />|' "$MANIFEST"
            echo "Bluetooth permissies toegevoegd"
          else
            echo "Permissies al aanwezig"
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PidLane-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
